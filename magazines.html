<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazines — Borrowdale Academy Media Club</title>
    <meta
      name="description"
      content="Browse all issues of the Borrowdale Academy Media Club Magazine."
    />
    <meta property="og:title" content="Magazines — Borrowdale Academy Media Club" />
    <meta property="og:description" content="Browse all issues of the Borrowdale Academy Media Club Magazine." />
    <meta property="og:image" content="https://borrowdaleacademymedia.club/images/Media%20Club%20Logo.png" />
    <meta property="og:url" content="https://borrowdaleacademymedia.club/magazines.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Magazines — Borrowdale Academy Media Club" />
    <meta name="twitter:description" content="Browse all issues of the Borrowdale Academy Media Club Magazine." />
    <meta name="twitter:image" content="https://borrowdaleacademymedia.club/images/Media%20Club%20Logo.png" />
    <link rel="icon" type="image/png" href="images/Media Club Logo.png" />
    <link rel="apple-touch-icon" href="images/Media Club Logo.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffcf10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/magazines.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img src="images/Media Club Logo.png" alt="Borrowdale Academy Media Club logo" />
          <span>
            <strong>Borrowdale Academy</strong>
            <small>Media Club</small>
          </span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="index.html#about">About</a>
          <a href="gallery.html">Gallery</a>
          <a href="magazines.html">Magazines</a>
          <a href="events.html">Events</a>
          <a href="index.html#contact">Contact</a>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 Dark mode</button>
        </nav>
      </div>
    </header>

    <section class="magazines-page-hero">
      <div class="container">
        <a href="index.html" class="back-link">← Back to home</a>
        <p class="eyebrow">Magazines</p>
        <h1>Our Magazine Collection</h1>
        <p class="magazines-hero-sub">
          Every issue captures the creativity, stories, and highlights from the Media Club.
        </p>
        <div class="gallery-stats">
          <span id="magazine-count">0 issues</span>
        </div>
      </div>
    </section>

    <main class="container magazines-page-main">
      <div id="magazines-grid" class="magazines-grid"></div>
    </main>

    <button class="back-to-top" id="backToTop" aria-label="Back to top" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <footer class="magazines-footer">
      <div class="container">
        <p>© <span class="year"></span> Borrowdale Academy Media Club · <a href="index.html">Return to home</a></p>
      </div>
    </footer>

    <!-- ── MAGAZINE READER OVERLAY ───────────────────────── -->
    <div id="magazine-reader" class="magazine-reader" aria-hidden="true" role="dialog" aria-label="Magazine reader">
      <div class="reader-backdrop" id="reader-backdrop"></div>
      <div class="reader-header">
        <h2 id="reader-title"></h2>
        <button class="reader-close" id="reader-close" aria-label="Close magazine">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="reader-body">
        <iframe id="reader-frame" title="Magazine viewer"></iframe>
      </div>
    </div>

    <noscript><style>.magazines-grid{display:none}</style><p style="text-align:center;padding:2rem;color:#5f6f7d">JavaScript is required to browse magazines.</p></noscript>
    <script src="data/magazine-manifest.js"></script>
    <script src="js/common.js"></script>
    <script src="js/magazines.js"></script>
  </body>
</html>
