<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazines — Borrowdale Academy Media Club</title>
    <meta
      name="description"
      content="Browse all issues of the Borrowdale Academy Media Club Magazine."
    />
    <link rel="icon" type="image/png" href="Media Club Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="magazines.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img src="Media Club Logo.png" alt="Borrowdale Academy Media Club logo" />
          <span>
            <strong>Borrowdale Academy</strong>
            <small>Media Club</small>
          </span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="index.html#about">About</a>
          <a href="magazines.html">Magazines</a>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 Dark mode</button>
        </nav>
      </div>
    </header>

    <section class="magazines-page-hero">
      <div class="container">
        <a href="index.html" class="back-link">← Back to home</a>
        <p class="eyebrow">Magazines</p>
        <h1>Our Magazine Collection</h1>
        <p class="magazines-hero-sub">
          Every issue captures the creativity, stories, and highlights from the Media Club.
        </p>
        <div class="gallery-stats">
          <span id="magazine-count">0 issues</span>
        </div>
      </div>
    </section>

    <main class="container magazines-page-main">
      <div id="magazines-grid" class="magazines-grid"></div>
    </main>

    <footer class="magazines-footer">
      <div class="container">
        <p>© 2025 Borrowdale Academy Media Club · <a href="index.html">Return to home</a></p>
      </div>
    </footer>

    <!-- ── MAGAZINE READER OVERLAY ───────────────────────── -->
    <div id="magazine-reader" class="magazine-reader" aria-hidden="true" role="dialog" aria-label="Magazine reader">
      <div class="reader-backdrop" id="reader-backdrop"></div>
      <div class="reader-header">
        <h2 id="reader-title"></h2>
        <button class="reader-close" id="reader-close" aria-label="Close magazine">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="reader-body">
        <iframe id="reader-frame" title="Magazine viewer"></iframe>
      </div>
    </div>

    <script src="magazine-manifest.js"></script>
    <script src="magazines.js"></script>
    <script>
      const themeToggle = document.getElementById('themeToggle');
      const root = document.documentElement;
      const applyTheme = (theme) => {
        const isDark = theme === 'dark';
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
      };
      applyTheme(localStorage.getItem('media-club-theme') || 'light');
      themeToggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('media-club-theme', next);
        applyTheme(next);
      });
      const navToggle = document.querySelector('.nav-toggle');
      const siteNav = document.querySelector('.site-nav');
      navToggle?.addEventListener('click', () => {
        const isOpen = siteNav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
    </script>
  </body>
</html>
