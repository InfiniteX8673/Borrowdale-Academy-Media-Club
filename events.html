<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events — Borrowdale Academy Media Club</title>
    <meta
      name="description"
      content="Upcoming events and activities from the Borrowdale Academy Media Club."
    />
    <meta property="og:title" content="Events — Borrowdale Academy Media Club" />
    <meta property="og:description" content="Upcoming events and activities from the Borrowdale Academy Media Club." />
    <meta property="og:image" content="https://borrowdaleacademymedia.club/images/Media%20Club%20Logo.png" />
    <meta property="og:url" content="https://borrowdaleacademymedia.club/events.html" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Events — Borrowdale Academy Media Club" />
    <meta name="twitter:description" content="Upcoming events and activities from the Borrowdale Academy Media Club." />
    <meta name="twitter:image" content="https://borrowdaleacademymedia.club/images/Media%20Club%20Logo.png" />
    <link rel="icon" type="image/png" href="images/Media Club Logo.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffcf10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/events.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img src="images/Media Club Logo.png" alt="Borrowdale Academy Media Club logo" />
          <span>
            <strong>Borrowdale Academy</strong>
            <small>Media Club</small>
          </span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="index.html#about">About</a>
          <a href="gallery.html">Gallery</a>
          <a href="magazines.html">Magazines</a>
          <a href="events.html">Events</a>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 Dark mode</button>
        </nav>
      </div>
    </header>

    <section class="events-page-hero">
      <div class="container">
        <a href="index.html" class="back-link">← Back to home</a>
        <p class="eyebrow">Events</p>
        <h1>Upcoming Events</h1>
        <p class="events-hero-sub">
          Stay up to date with workshops, showcases, and club activities.
        </p>
        <div class="gallery-stats">
          <span id="events-count">0 events</span>
          <span class="stats-dot">·</span>
          <span id="events-status"></span>
        </div>
      </div>
    </section>

    <main class="container events-page-main">
      <div id="events-list" class="events-list"></div>
    </main>

    <button class="back-to-top" id="backToTop" aria-label="Back to top" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <footer class="events-footer">
      <div class="container">
        <p>© <span class="year"></span> Borrowdale Academy Media Club · <a href="index.html">Return to home</a></p>
      </div>
    </footer>

    <script src="js/events.js"></script>
    <script>
      const themeToggle = document.getElementById('themeToggle');
      const root = document.documentElement;
      const applyTheme = (theme) => {
        const isDark = theme === 'dark';
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
      };
      applyTheme(localStorage.getItem('media-club-theme') || 'light');
      themeToggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('media-club-theme', next);
        applyTheme(next);
      });
      const navToggle = document.querySelector('.nav-toggle');
      const siteNav = document.querySelector('.site-nav');
      navToggle?.addEventListener('click', () => {
        const isOpen = siteNav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
      document.querySelectorAll('.year').forEach(el => { el.textContent = new Date().getFullYear(); });
      const backBtn = document.getElementById('backToTop');
      if (backBtn) {
        window.addEventListener('scroll', () => backBtn.classList.toggle('visible', window.scrollY > 400), { passive: true });
        backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
